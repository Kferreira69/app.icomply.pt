# ─────────────────────────────────────────────────────────────────────────────
# iComply — VPS Production (coexists with ai.contemporaryconstellation.pt)
#
# BEFORE FIRST RUN:
#   1. Create the shared Traefik network once on the VPS:
#        docker network create traefik-public
#   2. Deploy Traefik (see traefik/docker-compose.traefik.yml)
#   3. Copy .env.production.example → .env.production and fill in real values
#   4. Run:  docker-compose -f docker-compose.vps.yml --env-file .env.production up -d
#
# DOMAIN ROUTING (set DOMAIN in .env.production, e.g. app.icomply.pt)
#   https://${DOMAIN}        → Next.js frontend
#   https://api.${DOMAIN}    → NestJS backend
#   https://storage.${DOMAIN} → MinIO console (optional, internal only recommended)
# ─────────────────────────────────────────────────────────────────────────────

# ── Networks ──────────────────────────────────────────────────
# traefik-public: shared with other projects on the VPS (Traefik sees it)
# icomply-internal: private — only iComply services talk to each other here
networks:
  traefik-public:
    external: true          # Created once: docker network create traefik-public
  icomply-internal:
    name: icomply-internal
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────
volumes:
  icomply_postgres_data:
    name: icomply_postgres_data
  icomply_minio_data:
    name: icomply_minio_data
  icomply_redis_data:
    name: icomply_redis_data

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: icomply_postgres
    restart: unless-stopped
    networks:
      - icomply-internal          # NOT on traefik-public — DB never exposed
    environment:
      POSTGRES_USER: ${DB_USER:-icomply}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-icomply_db}
    volumes:
      - icomply_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-icomply}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: icomply_redis
    restart: unless-stopped
    networks:
      - icomply-internal          # NOT on traefik-public
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - icomply_redis_data:/data

  # ── MinIO ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: icomply_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    networks:
      - icomply-internal          # S3 API only accessible internally
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - icomply_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Backend (NestJS) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icomply_backend
    restart: unless-stopped
    networks:
      - icomply-internal
      - traefik-public            # Traefik routes api.${DOMAIN} here
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-icomply}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-icomply_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-icomply-evidence}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      APP_PORT: 3001
      APP_URL: https://api.${DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      ENABLE_AUDIT_LOG: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Router — api.domain.pt
      - "traefik.http.routers.icomply-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.icomply-api.entrypoints=websecure"
      - "traefik.http.routers.icomply-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.icomply-api.service=icomply-api"
      - "traefik.http.services.icomply-api.loadbalancer.server.port=3001"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.icomply-api-http.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.icomply-api-http.entrypoints=web"
      - "traefik.http.routers.icomply-api-http.middlewares=redirect-to-https"

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
    container_name: icomply_frontend
    restart: unless-stopped
    networks:
      - icomply-internal
      - traefik-public            # Traefik routes ${DOMAIN} here
    environment:
      NODE_ENV: production
      # Note: NEXT_PUBLIC_* vars are baked in at build time.
      # These runtime env vars are for server-side code only.
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
      NEXT_PUBLIC_APP_NAME: iComply
      NEXT_PUBLIC_APP_VERSION: '1.0.0'
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Router — domain.pt
      - "traefik.http.routers.icomply-frontend.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.icomply-frontend.entrypoints=websecure"
      - "traefik.http.routers.icomply-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.icomply-frontend.service=icomply-frontend"
      - "traefik.http.services.icomply-frontend.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.icomply-frontend-http.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.icomply-frontend-http.entrypoints=web"
      - "traefik.http.routers.icomply-frontend-http.middlewares=redirect-to-https"
