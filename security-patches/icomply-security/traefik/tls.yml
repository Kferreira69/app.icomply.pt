# traefik/config/tls.yml
# Configuração TLS hardened — apenas TLS 1.2 e 1.3

tls:
  options:
    default:
      minVersion: VersionTLS12
      maxVersion: VersionTLS13
      # Apenas cipher suites modernos e seguros
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
      # Curvas elípticas seguras
      curvePreferences:
        - X25519
        - CurveP256
        - CurveP384
      # Sem renegociação de sessão (mitigação BEAST)
      sniStrict: true

  # Certificados geridos pelo Traefik (Let's Encrypt)
  stores:
    default:
      defaultGeneratedCert:
        resolver: letsencrypt
        domain:
          main: "app.icomply.pt"
          sans:
            - "api.icomply.pt"
