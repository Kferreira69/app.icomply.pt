name: Deploy → Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to staging.icomply.pt
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDSSH'
          set -e

          echo "=== Sync staging branch ==="
          cd /opt/icomply/staging
          git fetch origin staging
          git reset --hard origin/staging
          git clean -fd -e '.env*' -e 'traefik/'
          echo "Commit: $(git rev-parse --short HEAD)"

          echo "=== Build & restart backend ==="
          docker compose -f docker-compose.staging.yml --env-file .env.staging \
            build --no-cache backend
          docker compose -f docker-compose.staging.yml --env-file .env.staging \
            up -d backend

          echo "=== Build & restart frontend ==="
          docker compose -f docker-compose.staging.yml --env-file .env.staging \
            build --no-cache frontend
          docker compose -f docker-compose.staging.yml --env-file .env.staging \
            up -d frontend

          echo "=== Health check ==="
          sleep 15
          curl -sf https://api.staging.icomply.pt/api/v1/health | grep '"status":"ok"'

          echo "=== Deploy staging complete ==="
          ENDSSH
