name: Deploy → Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to icomply.pt
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDSSH'
          set -e

          echo "=== Sync main branch ==="
          cd /opt/icomply
          git fetch origin main
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd
          echo "Commit: $(git rev-parse --short HEAD)"

          echo "=== Build & restart backend ==="
          docker compose -f docker-compose.vps.yml --env-file .env.production \
            build --no-cache backend
          docker compose -f docker-compose.vps.yml --env-file .env.production \
            up -d backend

          echo "=== Build & restart frontend ==="
          docker compose -f docker-compose.vps.yml --env-file .env.production \
            build --no-cache frontend
          docker compose -f docker-compose.vps.yml --env-file .env.production \
            up -d frontend

          echo "=== Health check ==="
          sleep 15
          curl -sf https://api.icomply.pt/api/v1/health | grep '"status":"ok"'

          echo "=== Deploy production complete ==="
          ENDSSH
