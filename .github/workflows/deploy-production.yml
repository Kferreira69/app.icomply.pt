name: Deploy → Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build images on GitHub Actions runner (npm cache + layer cache)
  # then push to GHCR.  VPS only does docker compose pull — no build.
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/kferreira69/icomply-backend:latest
          # GitHub Actions layer cache — huge speed-up on repeated npm install
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/kferreira69/icomply-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.icomply.pt/api/v1
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

  # ──────────────────────────────────────────────────────────────
  # Deploy — VPS pulls the pre-built images, restarts services
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to app.icomply.pt
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull & restart on VPS
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            GITHUB_OWNER="$GITHUB_OWNER" GITHUB_TOKEN="$GITHUB_TOKEN" \
            bash -s << 'ENDSSH'
          set -e

          echo "=== Sync config files (docker-compose, traefik, .env.example) ==="
          cd /opt/icomply
          git pull origin main --ff-only
          echo "Commit: $(git rev-parse --short HEAD)"

          echo "=== Login to GHCR ==="
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_OWNER" --password-stdin

          echo "=== Pull latest images ==="
          docker compose -f docker-compose.vps.yml --env-file .env.production pull

          echo "=== Restart services (zero-downtime rolling) ==="
          docker compose -f docker-compose.vps.yml --env-file .env.production up -d --remove-orphans

          echo "=== Clean up old images ==="
          docker image prune -f

          echo "=== Health check ==="
          sleep 20
          curl -sf https://api.icomply.pt/api/v1/health | grep '"status":"ok"'

          echo "=== Deploy production complete ==="
          ENDSSH
