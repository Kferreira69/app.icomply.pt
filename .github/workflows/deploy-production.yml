name: Deploy → Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to icomply.pt
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/icomply

            echo "=== Sync main branch (hard reset — no merge conflicts) ==="
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            echo "=== Code at commit: $(git rev-parse --short HEAD) ==="

            echo "=== Build & restart backend ==="
            docker compose -f docker-compose.vps.yml --env-file .env.production \
              build --no-cache backend
            docker compose -f docker-compose.vps.yml --env-file .env.production \
              up -d backend

            echo "=== Build & restart frontend ==="
            docker compose -f docker-compose.vps.yml --env-file .env.production \
              build --no-cache frontend
            docker compose -f docker-compose.vps.yml --env-file .env.production \
              up -d frontend

            echo "=== Health check ==="
            sleep 15
            curl -sf https://api.icomply.pt/api/v1/health | grep '"status":"ok"'

            echo "=== Deploy production complete ==="
