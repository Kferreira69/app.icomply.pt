services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: icomply_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: icomply
      POSTGRES_PASSWORD: icomply_secret
      POSTGRES_DB: icomply_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U icomply']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───
  minio:
    image: minio/minio:latest
    container_name: icomply_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Redis (sessions / rate limiting) ───────
  redis:
    image: redis:7-alpine
    container_name: icomply_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ── Backend (NestJS) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icomply_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://icomply:icomply_secret@postgres:5432/icomply_db
      S3_ENDPOINT: http://minio:9000
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── Frontend (Next.js) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: icomply_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  minio_data:
  redis_data:
